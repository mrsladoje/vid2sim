name: Reconstruction CI

on:
  push:
    branches: [ main ]
    paths:
      - 'src/reconstruction/**'
      - 'tests/reconstruction/**'
      - 'spec/reconstructed_object.md'
      - 'config/runpod.yaml'
      - 'infra/runpod/**'
      - '.github/workflows/reconstruction-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/reconstruction/**'
      - 'tests/reconstruction/**'
      - 'spec/reconstructed_object.md'
      - 'config/runpod.yaml'
      - 'infra/runpod/**'
      - '.github/workflows/reconstruction-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov ruff mypy
          pip install numpy trimesh pydantic pyyaml httpx jsonschema Pillow

      - name: Lint
        run: ruff check src/reconstruction tests/reconstruction

      - name: Test + coverage
        run: |
          pytest tests/reconstruction -q \
            --cov=src/reconstruction \
            --cov-report=term-missing \
            --cov-fail-under=0
