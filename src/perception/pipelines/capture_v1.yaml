# DepthAI v3 pipeline spec — documentation only.
#
# DepthAI v3 (>= 3.5.0) does NOT load pipeline graphs from YAML at runtime.
# The authoritative graph is the Python builder in
# `src/perception/capture.py::_build_pipeline`. This file mirrors the shape
# of that builder so reviewers can see the node topology at a glance without
# reading Python.
#
# LENS note: LENS is the Luxonis **neural stereo depth** model — it is *not*
# a property on StereoDepth. On RVC4 the equivalent runtime path is
# `dai.node.NeuralAssistedStereo` / `NeuralDepth` (loaded via
# DepthAI Model Zoo). We start on the classical `StereoDepth` with preset
# ROBOTICS, which is deterministic + well-understood; swapping in the neural
# path is a G1–G2 upgrade gated on a smoke-tested blob.
#
# Segmentation note: as of capture.py rev 2026-04-19, the default network
# is the Luxonis Zoo's `luxonis/yolov8-instance-segmentation-nano:coco-512x288`
# model, loaded via `depthai_nodes.ParsingNeuralNetwork` + `dai.NNModelDescription`
# (auto-download, cached). Output is `ImgDetectionsExtended` carrying
# per-instance pixel masks at 512x288 → upsampled to RGB resolution on host
# and stamped into mask_class.png + mask_track.png.
#
# `--prompts` is now an opt-in COCO-80 whitelist (default: common household
# objects: chair, couch, dining table, bottle, cup, vase, ...). Detections
# in classes outside the whitelist are dropped before the bundle is written.
#
# `--yolo-blob` is OPTIONAL — when given, a custom blob is loaded into a
# plain `DetectionNetwork` and the mask path falls back to bbox-rectangle
# blits (no per-instance pixel masks).
#
# **REQUIRED per spec v1.1**: capture.py aborts post-capture if zero
# tracked objects were emitted across the entire run. Stream 02 cannot
# reconstruct anything from a bundle without per-object masks.

version: 2
platform: RVC4
owner_module: src/perception/capture.py

nodes:
  - id: cam_rgb
    type: Camera
    socket: CAM_A
    output:
      size: [1920, 1080]
      type: BGR888i
      fps: 15

  - id: cam_left
    type: Camera
    socket: CAM_B
    output:
      size: [640, 400]
      type: GRAY8
      fps: 15

  - id: cam_right
    type: Camera
    socket: CAM_C
    output:
      size: [640, 400]
      type: GRAY8
      fps: 15

  - id: stereo
    type: StereoDepth
    preset: ROBOTICS
    depth_align_to: CAM_A
    output_size: [1920, 1080]
    left_right_check: true
    subpixel: true
    extended_disparity: false
    outputs:
      - depth          # 16-bit uint mm, host queue "depth"
      - confidenceMap  # 8-bit uint 0..255, host queue "conf"

  - id: imu
    type: IMU
    sensors:
      - ACCELEROMETER_RAW @ 400 Hz
      - GYROSCOPE_RAW     @ 400 Hz
    batch_report_threshold: 1
    max_batch_reports: 10

  # Default (zero-config): Luxonis Zoo YOLOv8-Seg via depthai_nodes
  # ParsingNeuralNetwork — output is ImgDetectionsExtended with per-instance
  # pixel masks. capture.py builds this when --yolo-blob is omitted.
  - id: detector
    type: ParsingNeuralNetwork
    zoo_model: "luxonis/yolov8-instance-segmentation-nano:coco-512x288"
    confidence_threshold: 0.4
    coco_class_whitelist: "<set via capture.py --prompts>"
    output: "ImgDetectionsExtended (boxes + per-instance pixel masks)"

connections:
  - cam_left.out  -> stereo.left
  - cam_right.out -> stereo.right
  - cam_rgb.out   -> detector.input

host_output_queues:
  - name: rgb      bound_to: cam_rgb.output
  - name: depth    bound_to: stereo.depth
  - name: conf     bound_to: stereo.confidenceMap
  - name: imu      bound_to: imu.out
  - name: det      bound_to: detector.out

bundle_mapping:
  rgb          -> frames/XXXXX.rgb.jpg        # JPEG q=90
  depth        -> frames/XXXXX.depth.png      # 16-bit PNG, mm
  conf         -> frames/XXXXX.conf.png       # 8-bit PNG
  mask_class   -> frames/XXXXX.mask_class.png # 8-bit PNG, COCO label idx (per-pixel via YOLOv8-Seg)
  mask_track   -> frames/XXXXX.mask_track.png # 16-bit PNG, per-instance track id
  imu          -> frames/XXXXX.imu.jsonl      # ~26 samples per frame at 15 fps, 400 Hz
  objects      -> frames/XXXXX.objects.json   # REQUIRED ≥1 detection across capture (spec v1.1)
